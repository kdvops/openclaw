# Independent stage values for openclaw frontend (QA)

image:
  repository: ghcr.io/openclaw/openclaw
  tag: latest

service:
  strategy:
    - name: active
      host: openclaw.qa.example.com
    - name: preview
      host: preview-openclaw.qa.example.com

virtualService:
  hosts:
    - openclaw.qa.example.com

ingress:
  tlsSecret: openclaw-frontend-qa-tls
  paths:
    - path: /hubs
      service: ""
      activeSuffix: active
      previewSuffix: preview
      port: 80
    - path: /
      service: ""
      activeSuffix: active
      previewSuffix: preview
      port: 80

configmap:
  data:
    APP_ENV: qa
    API_BASE_URL: /graphql

env:
  - name: TEST
    value: ""
