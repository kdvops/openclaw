# Independent stage values for portal-comercial frontend (QA)

image:
  tag: 770475f

service:
  strategy:
    - name: active
      host: openclaw.qa.example.com
    - name: preview
      host: preview-openclaw.qa.example.com

virtualService:
  hosts:
    - openclaw.qa.example.com

ingress:
  tlsSecret: pc-frontend-qa-tls
  paths:
    - path: /hubs
      service: svc-portal-comercial-qa-pc-backend-qa-webapp
      activeSuffix: active
      previewSuffix: preview
      port: 80
    - path: /
      service: ""
      activeSuffix: active
      previewSuffix: preview
      port: 80

configmap:
  data:
    APP_ENV: qa
    API_BASE_URL: /graphql

env:
  - name: TEST
    value: ""
