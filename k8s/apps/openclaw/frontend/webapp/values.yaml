# Default values for webapp.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: "ghcr.io/openclaw/openclaw"

  # This sets the pull policy for images. : Always | IfNotPresent | Never
  pullPolicy: Always
  
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

  

recycle:
  enabled: false

rollout:
  enabled: true

networkpolicy:
  enabled: false

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  fsGroup: 1001

securityContext: {}
securityContext:
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

  #runAsUser: 1000
  #runAsGroup: 1000
  #runAsNonRoot: true
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

#####################################
# This section is for setting up the virtual service for more information can be found here: https://istio.io/latest/docs/reference/config/networking/virtual-service/
#
istio:
  enabled: true
  
virtualService:
  enabled: true
  hosts:
    - istio-openclaw.kdvops.com
  gateway:
    name: bmsc-dev-gateway
    namespace: istio-system
  annotations: {}
    #external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    #external-dns.alpha.kubernetes.io/ttl: "1"
    #external-dns.alpha.kubernetes.io/target: 6cfa1402-18c1-4f26-ae92-68762856bd62.cfargotunnel.com
    # external-dns.alpha.kubernetes.io/hostname is generated from each strategy.host



service:
  type: ClusterIP        ##   LoadBalancer  |  NodePort  |  ClusterIP
  port: 3000
  svcPort: 80
  podPort: 3000

  strategy:
    - name: active
      host: openclaw.kdvops.com

    - name: preview
      host: preview-openclaw.kdvops.com



ingress:
  enabled: true
  className: nginx
  clusterIssuer: internal-ca
  tlsSecret: pw-frontend-tls
  annotations:
    cert-manager.io/cluster-issuer: internal-ca
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "256k"
    nginx.ingress.kubernetes.io/proxy-buffers: "32256k"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "512k"
    nginx.ingress.kubernetes.io/proxy-set-headers: "ingress-headers"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-cookie-path: "/; SameSite=None; Secure"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/enable-websocket: "true"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
  
  paths:
    - path: /hubs
      service: ''
      activeSuffix: active
      previewSuffix: preview
      port: 80

    - path: /
      service: ''
      activeSuffix: active
      previewSuffix: preview
      port: 3000


resources: #{}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 100Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
#livenessProbe: 
