apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "webapp.rolloutName" . }}  # rollout-{{ .Release.Namespace }} #{{ include "webapp.rolloutName" . }}
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 3

  analysis:
    # limits the number of successful analysis runs and experiments to be stored in a history
    # Defaults to 5.
    successfulRunHistoryLimit: 10
    # limits the number of unsuccessful analysis runs and experiments to be stored in a history.
    # Stages for unsuccessful: "Error", "Failed", "Inconclusive"
    # Defaults to 5.
    unsuccessfulRunHistoryLimit: 10

  selector:
    matchLabels:
      {{- include "webapp.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "webapp.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "webapp.saName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.podPort }}
              protocol: TCP


          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}


          {{- if or .Values.envFrom.configMapRef .Values.envFrom.secretRef }}
          envFrom:
            {{- if .Values.envFrom.configMapRef }}
            - configMapRef:
                name: {{ include "webapp.cmName" . }}
            {{- end }}
            {{- if .Values.envFrom.secretRef }}
            - secretRef:
                name: {{ include "webapp.secretName" . }}
            {{- end }}
          {{- end }}

          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}



          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

  # Minimum number of seconds for which a newly created pod should be ready
  # without any of its container crashing, for it to be considered available.
  # Defaults to 0 (pod will be considered available as soon as it is ready)
  #minReadySeconds: 10

  # The number of old ReplicaSets to retain.
  # Defaults to 10
  revisionHistoryLimit: 3
  # The rollback window provides a way to fast track deployments to
  # previously deployed versions.
  # Optional, and by default is not set.
  rollbackWindow:
    revisions: 3
  #paused: true

  strategy:
    blueGreen:
      activeService: active-{{ include "webapp.svcName" . }}
      previewService: preview-{{ include "webapp.svcName" . }}
      autoPromotionEnabled: true
      #scaleDownDelaySeconds: 30
      previewReplicaCount: 1
      autoPromotionSeconds: 5  ##

      #prePromotionAnalysis:
      #  templates:
      #    - templateName: {{ include "webapp.atName" . }}
      #  args:
      #    - name: service-name
      #      value: preview-{{ include "webapp.svcName" . }}.{{ .Release.Namespace }}.svc.cluster.local
      #    - name: service-port
      #      value: "{{ .Values.service.svcPort }}"
      #    - name: path
      #      value: "/"

      # postPromotionAnalysis:
      #   templates:
      #     - templateName: {{ include "webapp.atName" . }}
      #   args:
      #     - name: service-name
      #       value: active-{{ include "webapp.svcName" . }}.{{ .Release.Namespace }}.svc.cluster.local
      #     - name: service-port
      #       value: "{{ .Values.service.svcPort }}"
      #     - name: path
      #       value: "/"
