apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pc-mssql
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://BMSC@dev.azure.com/BMSC/Infrastructura/_git/ArgoCD
    #targetRevision: HEAD
    targetRevision: main
    path: k8s/apps/portal-comercial/mssql
    directory:
      recurse: true
      jsonnet: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: portal-comercial-bsc

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      enabled: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
