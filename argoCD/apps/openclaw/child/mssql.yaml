apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-mssql
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/kdvops/openclaw.git
    #targetRevision: HEAD
    targetRevision: main
    path: k8s/apps/openclaw/mssql
    directory:
      recurse: true
      jsonnet: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      enabled: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
