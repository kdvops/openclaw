apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: openclaw-frontend-stages
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - stage: dev
            url: https://kubernetes.default.svc
            namespace: openclaw-dev
            valuesPath: k8s/apps/openclaw/stages/frontend/values-dev-frontend.yaml
          - stage: qa
            url: https://kubernetes.default.svc
            namespace: openclaw-qa
            valuesPath: k8s/apps/openclaw/stages/frontend/values-qa-frontend.yaml
          - stage: prod
            url: https://kubernetes.default.svc
            namespace: openclaw-prod
            valuesPath: k8s/apps/openclaw/stages/frontend/values-prod-frontend.yaml
  template:
    metadata:
      name: 'openclaw-frontend-{{.stage}}-frontend'
      namespace: argocd
      annotations:
        kargo.akuity.io/authorized-stage: 'openclaw:{{.stage}}-frontend'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/kdvops/openclaw.git
          targetRevision: main
          path: k8s/apps/openclaw/frontend/webapp
          helm:
            releaseName: openclaw-frontend-{{.stage}}
            valueFiles:
              - values.yaml
              - '$values/{{.valuesPath}}'
            parameters:
              - name: fullnameOverride
                value: frontend
        - repoURL: https://github.com/kdvops/openclaw.git
          targetRevision: main
          ref: values
      destination:
        server: '{{.url}}'
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
          enabled: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - ServerSideApply=true
