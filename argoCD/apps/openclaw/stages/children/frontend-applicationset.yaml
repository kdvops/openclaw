apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: portal-comercial-frontend-stages
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - stage: dev
            url: https://kubernetes.default.svc
            namespace: portal-comercial-dev
            valuesPath: k8s/apps/portal-comercial/stages/frontend/values-dev-frontend.yaml
          - stage: next
            url: https://kubernetes.default.svc
            namespace: portal-comercial-next
            valuesPath: k8s/apps/portal-comercial/stages/frontend/values-next-frontend.yaml
          #- stage: qa
          #  url: https://kubernetes.default.svc
          #  namespace: portal-comercial-qa
          #  valuesPath: k8s/apps/portal-comercial/stages/frontend/values-qa-frontend.yaml
          #- stage: prod
          #  url: https://kubernetes.default.svc
          #  namespace: portal-comercial-prod
          #  valuesPath: k8s/apps/portal-comercial/stages/frontend/values-prod-frontend.yaml
  template:
    metadata:
      name: 'pc-frontend-{{.stage}}-frontend'
      namespace: argocd
      annotations:
        kargo.akuity.io/authorized-stage: 'portal-comercial:{{.stage}}-frontend'
    spec:
      project: default
      sources:
        - repoURL: https://BMSC@dev.azure.com/BMSC/Infrastructura/_git/ArgoCD
          targetRevision: main
          path: k8s/apps/portal-comercial/FrontEnd/webapp
          helm:
            releaseName: pc-frontend-{{.stage}}
            valueFiles:
              - values.yaml
              - '$values/{{.valuesPath}}'
            parameters:
              - name: fullnameOverride
                value: frontend
        - repoURL: https://BMSC@dev.azure.com/BMSC/Infrastructura/_git/ArgoCD
          targetRevision: main
          ref: values
      destination:
        server: '{{.url}}'
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
          enabled: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - ServerSideApply=true
