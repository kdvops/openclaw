apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: openclaw-backend-stages
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - stage: dev
            url: https://kubernetes.default.svc
            namespace: openclaw-dev
            valuesPath: k8s/apps/openclaw/stages/backend/values-dev-backend.yaml
          - stage: next
            url: https://kubernetes.default.svc
            namespace: openclaw-next
            valuesPath: k8s/apps/openclaw/stages/backend/values-next-backend.yaml
          #- stage: qa
          #  url: https://kubernetes.default.svc
          #  namespace: openclaw-qa
          #  valuesPath: k8s/apps/openclaw/stages/backend/values-qa-backend.yaml
          #- stage: prod
          #  url: https://kubernetes.default.svc
          #  namespace: openclaw-prod
          #  valuesPath: k8s/apps/openclaw/stages/backend/values-prod-backend.yaml
  template:
    metadata:
      name: 'openclaw-backend-{{.stage}}-backend'
      namespace: argocd
      annotations:
        kargo.akuity.io/authorized-stage: 'openclaw:{{.stage}}-backend'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/kdvops/openclaw.git
          targetRevision: main
          path: k8s/apps/openclaw/backend/webapp
          helm:
            releaseName: openclaw-backend-{{.stage}}
            valueFiles:
              - values.yaml
              - '$values/{{.valuesPath}}'
            parameters:
              - name: fullnameOverride
                value: backend
        - repoURL: https://github.com/kdvops/openclaw.git
          targetRevision: main
          ref: values
      destination:
        server: '{{.url}}'
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          enabled: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - ServerSideApply=true
