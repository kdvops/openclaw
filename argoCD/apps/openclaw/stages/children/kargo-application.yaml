apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-kargo-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: default
  source:
    repoURL: https://github.com/kdvops/openclaw.git
    targetRevision: main
    path: kargo/kargo-yaml/openclaw
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
