apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portal-comercial-kargo-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: default
  source:
    repoURL: https://BMSC@dev.azure.com/BMSC/Infrastructura/_git/ArgoCD
    targetRevision: main
    path: kargo/kargo-yaml/portal-comercial
  destination:
    server: https://kubernetes.default.svc
    namespace: portal-comercial
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
