apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-stages-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/kdvops/openclaw.git
    targetRevision: main
    path: argoCD/apps/openclaw/stages/children
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      enabled: true
    syncOptions:
      - CreateNamespace=false
      - PruneLast=true
      - ServerSideApply=true
