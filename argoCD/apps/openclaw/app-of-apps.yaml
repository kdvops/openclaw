apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/kdvops/openclaw.git
    targetRevision: main
    path: argoCD/apps/openclaw/stages/children
    directory:
      recurse: true
      jsonnet: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
