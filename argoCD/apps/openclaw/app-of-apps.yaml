apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portal-comercial-root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://BMSC@dev.azure.com/BMSC/Infrastructura/_git/ArgoCD
    targetRevision: main
    path: argocd/apps/portal-comercial/child
    directory:
      recurse: true
      jsonnet: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: portal-comercial-bsc

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
